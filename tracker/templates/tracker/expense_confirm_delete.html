{% extends 'tracker/base.html' %}
{% block title %}Delete Expense{% endblock %}
{% block content %}
<div class="topbar"><h1>Delete Expense</h1></div>
<div class="card" style="max-width:480px;">
  <p>Are you sure you want to delete "<strong>{{ expense.title }}</strong>" (₹{{ expense.amount }})?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
